# ============================================================
# Decap CMS yapılandırması — Eray Interiors yönetim paneli
# Giriş: Netlify Identity + Git Gateway (Netlify panelinden etkinleştirilir)
# Panelden yapılan her değişiklik GitHub'daki main dalına commit'lenir.
# ============================================================

backend:
  name: git-gateway
  branch: main

# Yüklenen görsellerin kaydedileceği klasör ve sitede kullanılacak yol
media_folder: "assets/img"
public_folder: "assets/img"

# Panel arayüz dili
locale: "tr"

collections:
  - name: "pages"
    label: "Sayfalar"
    label_singular: "Sayfa"
    delete: false            # sayfa dosyaları silinemesin
    files:
      - name: "home"
        label: "Ana Sayfa"
        file: "content/home.json"
        fields:
          - { name: "hero", label: "Hero (büyük üst görsel)", widget: "image", required: false }
          - name: "gallery"
            label: "Galeri görselleri"
            widget: "list"
            required: false
            field: { name: "image", label: "Görsel", widget: "image" }

      - name: "ozel"
        label: "Özel Tasarım"
        file: "content/ozel.json"
        fields:
          - { name: "hero", label: "Hero (büyük üst görsel)", widget: "image", required: false }
          - name: "gallery"
            label: "Galeri görselleri"
            widget: "list"
            required: false
            field: { name: "image", label: "Görsel", widget: "image" }

      - name: "ic"
        label: "İç Mekânlar"
        file: "content/ic.json"
        fields:
          - { name: "hero", label: "Hero (büyük üst görsel)", widget: "image", required: false }
          - name: "gallery"
            label: "Galeri görselleri"
            widget: "list"
            required: false
            field: { name: "image", label: "Görsel", widget: "image" }

      - name: "mutfak"
        label: "Mutfaklar"
        file: "content/mutfak.json"
        fields:
          - { name: "hero", label: "Hero (büyük üst görsel)", widget: "image", required: false }
          - name: "gallery"
            label: "Galeri görselleri"
            widget: "list"
            required: false
            field: { name: "image", label: "Görsel", widget: "image" }
