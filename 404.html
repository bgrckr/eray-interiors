  <style>
    :root{ --white:#fff; }
    *{ box-sizing:border-box; }
    body{
      margin:0; min-height:100vh; min-height:100svh; background:#000; color:#fff;
      font-family:'Jost',system-ui,sans-serif; font-weight:300;

    a.btn{
      color:#fff; text-decoration:none; border:1px solid rgba(255,255,255,.3);
      padding:11px 20px; border-radius:6px; letter-spacing:.08em; text-transform:uppercase;
      font-size:.78rem; transition:background .2s,border-color .2s;
    }
    a.btn:hover{ background:rgba(255,255,255,.12); border-color:#fff; }
    a.btn.primary{ background:#fff; color:#000; border-color:#fff; }
    a.btn.primary:hover{ opacity:.88; }
