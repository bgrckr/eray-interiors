  # KLASÖRLER — her menü için AYRI bölüm. Kategori dosyadan bellidir (ayrıca seçmeye gerek yok).
  # Site (js/projects.js) bu 4 dosyayı okuyup birleştirir; görünüm aynı kalır.
  - name: projects_ic
    label: "İç Mekanlar — Klasörler"
    type: file
    path: content/projects-ic.json
    fields:
      - name: projects
        label: "İç Mekanlar klasörleri — istediğin kadar ekle (her klasör şeritte bir kutu)"
        type: object
        list: true
        fields:
          - { name: slug, label: "Kısa ad (link için, ör. bebek-daire)", type: string }
          - { name: date, label: "Tarih", type: date }
          - { name: featured, label: "Ana sayfada öne çıkar", type: boolean }
          - { name: cover, label: "Ana görsel (kapak — tıklanınca klasör açılır)", type: image }
          - name: title
            label: "Klasör adı"
            type: object
            fields:
              - { name: tr, label: "Türkçe", type: string }
              - { name: en, label: "English", type: string }
              - { name: es, label: "Español", type: string }
          - name: blocks
            label: "Görseller (sırayla). Yazı eklenen görsel tam genişlik + yan yazı (sırayla sol/sağ); yazısız görseller 2 sütun."
            type: object
            list: true
            fields:
              - { name: image, label: "Görsel", type: image }
              - name: caption
                label: "Görselin yanına yazı — İSTEĞE BAĞLI (boş = yazısız/2 sütun)"
                type: object
                fields:
                  - { name: tr, label: "Türkçe", type: text }
                  - { name: en, label: "English", type: text }
                  - { name: es, label: "Español", type: text }

