# ============================================================
# Pages CMS yapılandırması — Eray Interiors yönetim paneli
# Panel: https://app.pagescms.org (GitHub hesabıyla giriş)
# Netlify/Identity GEREKTİRMEZ. Panelden yapılan her değişiklik
# doğrudan GitHub deposundaki main dalına kaydedilir; GitHub Pages
# siteyi otomatik günceller.
# ============================================================

media:
  input: assets/img          # yüklenen görsellerin depoda kaydedileceği klasör
  output: assets/img         # görsele sitede erişim yolu (göreli — Pages alt-klasörüyle uyumlu)
  extensions: [jpg, jpeg, png, webp, gif, svg]

# Her sayfa alanı 3 dilde (TR/EN/ES) düzenlenir. Metinlerde paragrafları
# BOŞ SATIRLA ayırın. Görselleri "hero" ve "galeri" alanlarından yükleyin.
content:
  - name: home
    label: Ana Sayfa
    type: file
    path: content/home.json
    fields:
      - { name: hero, label: "Hero (tek görsel — slayt yoksa yedek)", type: image }
      - { name: hero_slides, label: "Hero slaytları (5 büyük görsel, yavaş kayar)", type: image, list: true }
      - name: hero_title
        label: "Hero başlığı"
        type: object
        fields:
          - { name: tr, label: "Türkçe", type: string }
          - { name: en, label: "English", type: string }
          - { name: es, label: "Español", type: string }
      - name: hero_sub
        label: "Hero alt başlığı"
        type: object
        fields:
          - { name: tr, label: "Türkçe", type: string }
          - { name: en, label: "English", type: string }
          - { name: es, label: "Español", type: string }
      - name: title
        label: "Sayfa başlığı"
        type: object
        fields:
          - { name: tr, label: "Türkçe", type: string }
          - { name: en, label: "English", type: string }
          - { name: es, label: "Español", type: string }
      - name: body
        label: "Tanıtım metni (paragrafları boş satırla ayırın)"
        type: object
        fields:
          - { name: tr, label: "Türkçe", type: text }
          - { name: en, label: "English", type: text }
          - { name: es, label: "Español", type: text }
      - { name: gallery, label: "Galeri görselleri", type: image, list: true }

  - name: ozel
    label: Özel Tasarım
    type: file
    path: content/ozel.json
    fields:
      - { name: hero, label: "Hero (büyük üst görsel)", type: image }
      - name: hero_title
        label: "Hero başlığı"
        type: object
        fields:
          - { name: tr, label: "Türkçe", type: string }
          - { name: en, label: "English", type: string }
          - { name: es, label: "Español", type: string }
      - name: hero_sub
        label: "Hero alt başlığı"
        type: object
        fields:
          - { name: tr, label: "Türkçe", type: string }
          - { name: en, label: "English", type: string }
          - { name: es, label: "Español", type: string }
      - name: title
        label: "Sayfa başlığı"
        type: object
        fields:
          - { name: tr, label: "Türkçe", type: string }
          - { name: en, label: "English", type: string }
          - { name: es, label: "Español", type: string }
      - name: body
        label: "Tanıtım metni (paragrafları boş satırla ayırın)"
        type: object
        fields:
          - { name: tr, label: "Türkçe", type: text }
          - { name: en, label: "English", type: text }
          - { name: es, label: "Español", type: text }
      - { name: gallery, label: "Galeri görselleri", type: image, list: true }

  - name: ic
    label: İç Mekânlar
    type: file
    path: content/ic.json
    fields:
      - { name: hero, label: "Hero (büyük üst görsel)", type: image }
      - name: hero_title
        label: "Hero başlığı"
        type: object
        fields:
          - { name: tr, label: "Türkçe", type: string }
          - { name: en, label: "English", type: string }
          - { name: es, label: "Español", type: string }
      - name: hero_sub
        label: "Hero alt başlığı"
        type: object
        fields:
          - { name: tr, label: "Türkçe", type: string }
          - { name: en, label: "English", type: string }
          - { name: es, label: "Español", type: string }
      - name: title
        label: "Sayfa başlığı"
        type: object
        fields:
          - { name: tr, label: "Türkçe", type: string }
          - { name: en, label: "English", type: string }
          - { name: es, label: "Español", type: string }
      - name: body
        label: "Tanıtım metni (paragrafları boş satırla ayırın)"
        type: object
        fields:
          - { name: tr, label: "Türkçe", type: text }
          - { name: en, label: "English", type: text }
          - { name: es, label: "Español", type: text }
      - { name: gallery, label: "Galeri görselleri", type: image, list: true }

  - name: ticari
    label: Ticari Mekanlar
    type: file
    path: content/ticari.json
    fields:
      - { name: hero, label: "Hero (büyük üst görsel)", type: image }
      - name: hero_title
        label: "Hero başlığı"
        type: object
        fields:
          - { name: tr, label: "Türkçe", type: string }
          - { name: en, label: "English", type: string }
          - { name: es, label: "Español", type: string }
      - name: hero_sub
        label: "Hero alt başlığı"
        type: object
        fields:
          - { name: tr, label: "Türkçe", type: string }
          - { name: en, label: "English", type: string }
          - { name: es, label: "Español", type: string }
      - name: title
        label: "Sayfa başlığı"
        type: object
        fields:
          - { name: tr, label: "Türkçe", type: string }
          - { name: en, label: "English", type: string }
          - { name: es, label: "Español", type: string }
      - name: body
        label: "Tanıtım metni (paragrafları boş satırla ayırın)"
        type: object
        fields:
          - { name: tr, label: "Türkçe", type: text }
          - { name: en, label: "English", type: text }
          - { name: es, label: "Español", type: text }
      - { name: gallery, label: "Galeri görselleri", type: image, list: true }

  - name: blog
    label: Blog Yazıları
    type: file
    path: content/blog.json
    fields:
      - name: posts
        label: "Yazılar"
        type: object
        list: true
        fields:
          - { name: slug, label: "Kısa ad (link için, ör. mutfak-trendleri)", type: string }
          - { name: date, label: "Tarih", type: date }
          - { name: cover, label: "Kapak görseli", type: image }
          - name: title
            label: "Başlık"
            type: object
            fields:
              - { name: tr, label: "Türkçe", type: string }
              - { name: en, label: "English", type: string }
              - { name: es, label: "Español", type: string }
          - name: excerpt
            label: "Özet (liste kartında görünür)"
            type: object
            fields:
              - { name: tr, label: "Türkçe", type: text }
              - { name: en, label: "English", type: text }
              - { name: es, label: "Español", type: text }
          - name: body
            label: "Yazı metni (paragrafları boş satırla ayırın)"
            type: object
            fields:
              - { name: tr, label: "Türkçe", type: text }
              - { name: en, label: "English", type: text }
              - { name: es, label: "Español", type: text }
          - { name: images, label: "Ek görseller (yazı içinde)", type: image, list: true }

  - name: projects
    label: Projeler
    type: file
    path: content/projects.json
    fields:
      - name: projects
        label: "Projeler"
        type: object
        list: true
        fields:
          - { name: slug, label: "Kısa ad (link için, ör. bebek-daire)", type: string }
          - { name: date, label: "Proje tarihi", type: date }
          - name: category
            label: "Kategori"
            type: select
            options:
              values: [ic, mutfak, ozel, ticari]
          - { name: featured, label: "Ana sayfada öne çıkar", type: boolean }
          - { name: cover, label: "Kapak görseli (kayan kutu)", type: image }
          - name: title
            label: "Proje adı"
            type: object
            fields:
              - { name: tr, label: "Türkçe", type: string }
              - { name: en, label: "English", type: string }
              - { name: es, label: "Español", type: string }
          - name: blocks
            label: "Görsel blokları (sırayı ve sol/sağ konumu siz belirlersiniz)"
            type: object
            list: true
            fields:
              - { name: image, label: "Görsel", type: image }
              - name: side
                label: "Konum (sol / sağ)"
                type: select
                options:
                  values: [left, right]
              - name: caption
                label: "Görselin yanına yazı (boş bırakılabilir)"
                type: object
                fields:
                  - { name: tr, label: "Türkçe", type: text }
                  - { name: en, label: "English", type: text }
                  - { name: es, label: "Español", type: text }

  - name: mutfak
    label: Mutfaklar
    type: file
    path: content/mutfak.json
    fields:
      - { name: hero, label: "Hero (büyük üst görsel)", type: image }
      - name: hero_title
        label: "Hero başlığı"
        type: object
        fields:
          - { name: tr, label: "Türkçe", type: string }
          - { name: en, label: "English", type: string }
          - { name: es, label: "Español", type: string }
      - name: hero_sub
        label: "Hero alt başlığı"
        type: object
        fields:
          - { name: tr, label: "Türkçe", type: string }
          - { name: en, label: "English", type: string }
          - { name: es, label: "Español", type: string }
      - name: title
        label: "Sayfa başlığı"
        type: object
        fields:
          - { name: tr, label: "Türkçe", type: string }
          - { name: en, label: "English", type: string }
          - { name: es, label: "Español", type: string }
      - name: body
        label: "Tanıtım metni (paragrafları boş satırla ayırın)"
        type: object
        fields:
          - { name: tr, label: "Türkçe", type: text }
          - { name: en, label: "English", type: text }
          - { name: es, label: "Español", type: text }
      - { name: gallery, label: "Galeri görselleri", type: image, list: true }
