<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İç Mekânlar — Eray Interiors</title>
  <meta name="description" content="Eray Interiors — konut ve ticari mekânlar için iç mekân tasarımı.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&family=Raleway:wght@200;300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="ic">
  <header id="site-header"></header>

  <main>
    <section class="hero" style="background-image:url('assets/img/hero-ic.jpg')">
      <div class="hero-overlay">
        <h1 class="hero-title" data-i18n="page.ic.hero"></h1>
        <p class="hero-sub" data-i18n="page.ic.sub"></p>
      </div>
    </section>

    <section class="page-intro">
      <h2 class="page-title" data-i18n="page.ic.title"></h2>
      <div class="page-body" data-i18n="page.ic.body" data-i18n-html></div>
    </section>

    <section class="carousel" data-carousel aria-label="Galeri">
      <button class="car-arrow car-prev" aria-label="Önceki"></button>
      <div class="carousel-viewport">
        <div class="carousel-track">
          <div class="slide" style="background-image:url('assets/img/ic-1.jpg')">01</div>
          <div class="slide" style="background-image:url('assets/img/ic-2.jpg')">02</div>
          <div class="slide" style="background-image:url('assets/img/ic-3.jpg')">03</div>
          <div class="slide" style="background-image:url('assets/img/ic-4.jpg')">04</div>
          <div class="slide" style="background-image:url('assets/img/ic-5.jpg')">05</div>
          <div class="slide" style="background-image:url('assets/img/ic-6.jpg')">06</div>
        </div>
      </div>
      <button class="car-arrow car-next" aria-label="Sonraki"></button>
    </section>
  </main>

  <footer id="site-footer"></footer>

  <script src="js/icons.js"></script>
  <script src="js/data.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/header.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/carousel.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
