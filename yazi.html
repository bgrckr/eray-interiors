<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Yazısı | Eray Interiors</title>
  <meta name="description" content="Eray Interiors blog yazısı.">
  <meta name="robots" content="index, follow, max-image-preview:large">
  <meta name="author" content="Eray Interiors">
  <meta name="theme-color" content="#000000">

  <!-- Favicon / app icons -->
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">

  <!-- Open Graph (başlık/açıklama yazıya göre JS ile de güncellenir) -->
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="Eray Interiors">
  <meta property="og:image" content="https://erayinteriors.com/assets/og-image.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&family=Raleway:wght@200;300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="site-header"></header>

  <main>
    <article id="blog-post" class="post"></article>
  </main>

  <footer id="site-footer"></footer>

  <script src="js/icons.js"></script>
  <script src="js/data.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/header.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/content.js"></script>
  <script src="js/carousel.js"></script>
  <script src="js/app.js"></script>
  <script src="js/blog.js"></script>
</body>
</html>
